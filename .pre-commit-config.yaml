# Pre-commit hooks: run on every `git commit`.
#
# One-time install per clone:
#     python -m pip install pre-commit
#     pre-commit install
#
# Manual run over the whole tree:
#     pre-commit run --all-files

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.13
    hooks:
      - id: ruff
        args: ["--fix", "--exit-non-zero-on-fix"]
      - id: ruff-format

  - repo: local
    hooks:
      - id: anti-ai-markers
        name: Anti-AI markers (em-dash, curly quotes, buzzwords)
        entry: python scripts/check_anti_ai_markers.py
        language: system
        types: [text]
        exclude: ^(generated_tests/|docs/)

      - id: pytest-fast
        name: Pytest fast smoke (unit tests, no integration)
        entry: python -m pytest -x -q --no-header -m "not integration"
        language: system
        pass_filenames: false
        stages: [pre-commit]
