name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and dev tools
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest
        run: pytest -v

      - name: Smoke-test installed CLI on sample data
        run: |
          secure-log2test data/sample_kibana_export.json --output /tmp/generated.py
          python -c "import ast; ast.parse(open('/tmp/generated.py').read())"

      - name: Build wheel + sdist
        run: |
          pip install build
          python -m build
          ls dist/

      - name: Wheel install smoke (fresh venv, no source files) [Linux/macOS]
        if: runner.os != 'Windows'
        run: |
          python -m venv /tmp/wheel-smoke-venv
          /tmp/wheel-smoke-venv/bin/pip install --upgrade pip
          /tmp/wheel-smoke-venv/bin/pip install dist/*.whl
          /tmp/wheel-smoke-venv/bin/secure-log2test --help
          /tmp/wheel-smoke-venv/bin/secure-log2test data/sample_kibana_export.json --output /tmp/wheel_smoke_out.py
          python -c "import ast; ast.parse(open('/tmp/wheel_smoke_out.py').read())"

      - name: Wheel install smoke (fresh venv, no source files) [Windows]
        if: runner.os == 'Windows'
        shell: bash
        run: |
          python -m venv /tmp/wheel-smoke-venv
          /tmp/wheel-smoke-venv/Scripts/pip install --upgrade pip
          /tmp/wheel-smoke-venv/Scripts/pip install dist/*.whl
          /tmp/wheel-smoke-venv/Scripts/secure-log2test --help
          /tmp/wheel-smoke-venv/Scripts/secure-log2test data/sample_kibana_export.json --output /tmp/wheel_smoke_out.py
          python -c "import ast; ast.parse(open('/tmp/wheel_smoke_out.py').read())"
